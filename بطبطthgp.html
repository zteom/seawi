<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة اعتذار رومانسية — Infinite Showpiece</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #081325;
      --bg-mid: #040913;
      --bg-bottom: #000000;
      --pink: #ff77c8;
      --pink-2: #ffb7de;
      --cyan: #8fd7ff;
      --gold: #ffd180;
      --white: #f7fbff;
      --glass: rgba(255,255,255,0.1);
      --glass-border: rgba(255,255,255,0.16);
      --sceneX: 0px;
      --sceneY: 0px;
      --tiltX: 0deg;
      --tiltY: 0deg;
    }* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Tajawal', system-ui, sans-serif;
  color: var(--white);
  background:
    radial-gradient(circle at 18% 16%, rgba(66,104,172,0.28), transparent 28%),
    radial-gradient(circle at 82% 18%, rgba(150,56,133,0.22), transparent 24%),
    radial-gradient(circle at 50% 88%, rgba(48,92,146,0.15), transparent 30%),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 40%, var(--bg-bottom) 100%);
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

body::before {
  background:
    radial-gradient(circle at 50% 15%, rgba(180,214,255,0.06), transparent 30%),
    radial-gradient(circle at 12% 85%, rgba(146,193,255,0.08), transparent 28%),
    radial-gradient(circle at 88% 80%, rgba(255,118,202,0.10), transparent 24%);
  filter: blur(30px);
  transform: translate3d(calc(var(--sceneX) * -0.06), calc(var(--sceneY) * -0.04), 0);
}

body::after {
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.10) 55%, rgba(0,0,0,0.48) 100%);
}

#fxCanvas,
#reflectionCanvas,
#glassCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}

#fxCanvas { z-index: 2; }
#reflectionCanvas { z-index: 2; mix-blend-mode: screen; opacity: 0.92; }
#glassCanvas { z-index: 6; opacity: 0.74; filter: blur(0.25px); }

.mist-wrap {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 46vh;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
  transform: translate3d(calc(var(--sceneX) * -0.04), calc(var(--sceneY) * 0.02), 0);
}

.mist-layer,
.mist-layer::before,
.mist-layer::after {
  content: "";
  position: absolute;
  bottom: -8%;
  left: -14%;
  right: -14%;
  height: 78%;
  border-radius: 50%;
  filter: blur(28px);
  background: radial-gradient(ellipse at center, rgba(218,229,255,0.16) 0%, rgba(199,214,245,0.10) 30%, rgba(125,140,175,0.06) 56%, transparent 76%);
  mix-blend-mode: screen;
}

.mist-layer.one { opacity: 0.85; animation: mistDriftA 24s ease-in-out infinite alternate; }
.mist-layer.one::before { width: 72%; left: 1%; bottom: 10%; opacity: 0.72; animation: mistDriftB 28s ease-in-out infinite alternate; }
.mist-layer.one::after { width: 58%; left: auto; right: 3%; bottom: 8%; opacity: 0.66; animation: mistDriftC 31s ease-in-out infinite alternate; }
.mist-layer.two { opacity: 0.46; filter: blur(38px); animation: mistDriftD 34s ease-in-out infinite alternate; transform: scale(1.18); }

@keyframes mistDriftA { from { transform: translateX(-3%) translateY(0) scale(1.02);} to { transform: translateX(4%) translateY(-2%) scale(1.08);} }
@keyframes mistDriftB { from { transform: translateX(4%) scale(1);} to { transform: translateX(-5%) translateY(-1%) scale(1.12);} }
@keyframes mistDriftC { from { transform: translateX(-2%) scale(1.03);} to { transform: translateX(5%) translateY(-1.5%) scale(1.15);} }
@keyframes mistDriftD { from { transform: translateX(-1%) translateY(0) scale(1.18);} to { transform: translateX(2.5%) translateY(-1.2%) scale(1.23);} }

.ui {
  position: fixed;
  inset: 0;
  z-index: 7;
  pointer-events: none;
}

.headline {
  position: absolute;
  top: clamp(18px, 4vw, 34px);
  left: 50%;
  transform: translateX(-50%) translate3d(calc(var(--sceneX) * 0.03), calc(var(--sceneY) * 0.02), 0);
  width: min(92vw, 780px);
  margin: 0;
  text-align: center;
  font-family: 'Cairo', sans-serif;
  font-size: clamp(2.15rem, 6vw, 4.8rem);
  font-weight: 800;
  color: #ffe0f0;
  letter-spacing: 0.02em;
  text-shadow: 0 0 6px rgba(255,255,255,0.8), 0 0 14px rgba(255,126,205,0.95), 0 0 32px rgba(255,126,205,0.80), 0 0 60px rgba(255,126,205,0.50), 0 0 110px rgba(255,126,205,0.24);
  animation: neonPulse 3.6s ease-in-out infinite;
  user-select: none;
}

.headline::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 100%;
  width: 54%;
  height: 10px;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,130,208,0.48), transparent 72%);
  filter: blur(10px);
  opacity: 0.75;
}

@keyframes neonPulse { 0%,100% { filter: brightness(1) saturate(1);} 50% { filter: brightness(1.08) saturate(1.2);} }

.message-wrap {
  position: absolute;
  left: 50%;
  bottom: clamp(22px, 5vh, 48px);
  transform: translateX(-50%) translate3d(calc(var(--sceneX) * 0.045), calc(var(--sceneY) * -0.02), 0);
  width: min(90vw, 720px);
  min-height: 112px;
  display: grid;
  place-items: center;
}

.message-card {
  width: 100%;
  position: relative;
  overflow: hidden;
  padding: 19px 24px;
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.15);
  background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.045));
  backdrop-filter: blur(18px) saturate(1.12);
  box-shadow: 0 14px 44px rgba(0,0,0,0.36), inset 0 1px 0 rgba(255,255,255,0.16), 0 0 40px rgba(255,122,203,0.08);
}

.message-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(255,255,255,0.10), transparent 28%, rgba(255,255,255,0.03) 58%, transparent 78%);
}

.message-card::after {
  content: "";
  position: absolute;
  inset: auto 5% 0;
  height: 26px;
  background: radial-gradient(circle at center, rgba(255,132,208,0.18), transparent 72%);
  filter: blur(14px);
}

.message {
  position: relative;
  z-index: 1;
  margin: 0;
  white-space: pre-line;
  text-align: center;
  line-height: 1.9;
  font-size: clamp(1.06rem, 3.1vw, 1.54rem);
  color: rgba(248,251,255,0.97);
  text-shadow: 0 2px 18px rgba(0,0,0,0.28);
  opacity: 0;
  transform: translateY(12px) scale(0.985);
  transition: opacity 1.1s ease, transform 1.1s ease, filter 1.1s ease;
  filter: blur(4px);
}

.message.show { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }

.audio-control {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 9;
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 50px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.16);
  background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.055));
  backdrop-filter: blur(18px) saturate(1.15);
  box-shadow: 0 10px 32px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.16), 0 0 24px rgba(255,120,201,0.12);
  color: #eef6ff;
  cursor: pointer;
  transition: transform .26s ease, box-shadow .26s ease, border-color .26s ease;
}

.audio-control:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.18), 0 0 26px rgba(255,120,201,0.18);
  border-color: rgba(255,255,255,0.22);
}

.audio-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 0 18px rgba(255,110,196,0.16);
  font-size: 0.9rem;
}

.audio-label { font-size: 0.96rem; font-weight: 700; }

.overlay {
  position: fixed;
  inset: 0;
  z-index: 11;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 50% 44%, rgba(255,121,203,0.16), transparent 18%), linear-gradient(180deg, rgba(1,5,12,0.50), rgba(0,0,0,0.88));
  backdrop-filter: blur(12px);
  transition: opacity 1s ease, visibility 1s ease;
}

.overlay.hide { opacity: 0; visibility: hidden; }

.enter-btn {
  pointer-events: auto;
  position: relative;
  border: 1px solid rgba(255,255,255,0.2);
  background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
  color: #fff5fb;
  font-family: 'Cairo', sans-serif;
  font-size: clamp(1.08rem, 4vw, 1.42rem);
  font-weight: 800;
  padding: 18px 36px;
  border-radius: 999px;
  cursor: pointer;
  backdrop-filter: blur(20px) saturate(1.2);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 12px 42px rgba(0,0,0,0.48), 0 0 28px rgba(255,113,197,0.35), 0 0 84px rgba(255,113,197,0.18);
  transition: transform .28s ease, box-shadow .28s ease;
  overflow: hidden;
}

.enter-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 8%, rgba(255,255,255,0.22) 30%, transparent 52%);
  transform: translateX(-130%);
  animation: sweep 3.4s ease-in-out infinite;
}

.enter-btn::after {
  content: "";
  position: absolute;
  inset: -22%;
  background: radial-gradient(circle, rgba(255,119,200,0.24), transparent 45%);
  filter: blur(24px);
  z-index: -1;
}

.enter-btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 18px 52px rgba(0,0,0,0.54), 0 0 34px rgba(255,113,197,0.46), 0 0 96px rgba(255,113,197,0.20);
}

@keyframes sweep { 0%,100% { transform: translateX(-130%);} 50% { transform: translateX(140%);} }

.stage {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: grid;
  place-items: center;
  pointer-events: none;
  perspective: 1600px;
  transform-style: preserve-3d;
}

.hero {
  position: relative;
  width: min(92vw, 700px);
  aspect-ratio: 1 / 1.08;
  transform-style: preserve-3d;
  transform: translate3d(calc(var(--sceneX) * 0.06), calc(var(--sceneY) * 0.05), 0) rotateX(var(--tiltY)) rotateY(var(--tiltX));
  transition: transform .22s ease-out;
  filter: drop-shadow(0 24px 60px rgba(0,0,0,0.32));
}

.ambient-backlight {
  position: absolute;
  inset: 14% 8% 14%;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.24), transparent 18%), radial-gradient(circle at 54% 56%, rgba(131,186,255,0.24), transparent 30%), radial-gradient(circle at 48% 50%, rgba(255,124,205,0.18), transparent 42%);
  filter: blur(40px);
  opacity: 0.78;
  transform: translate3d(calc(var(--sceneX) * -0.05), calc(var(--sceneY) * -0.02), -30px);
}

.butterfly-trail {
  position: absolute;
  inset: 0;
  pointer-events: none;
  mix-blend-mode: screen;
  filter: blur(12px);
  opacity: 0.6;
}

.butterfly-trail::before,
.butterfly-trail::after {
  content: "";
  position: absolute;
  width: 128px;
  height: 34px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(255,130,205,0), rgba(255,130,205,0.28), rgba(159,220,255,0.22), rgba(255,130,205,0));
  animation: trailOrbit 14s cubic-bezier(.42,.02,.27,1) infinite;
}

.butterfly-trail::after { width: 92px; height: 24px; opacity: 0.75; animation-delay: -1.2s; }

.duck-wrap {
  position: absolute;
  inset: 7% 6% 8%;
  animation: floatDuck 6.8s ease-in-out infinite;
  transform-style: preserve-3d;
  transform-origin: 50% 62%;
  filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
}

.duck-shell {
  position: absolute;
  inset: 0;
  animation: cinematicReveal 2.8s cubic-bezier(.18,.8,.18,1) both;
  transform-origin: 50% 60%;
}

.duck-highlight-sheen {
  position: absolute;
  inset: 18% 18% 20%;
  background: linear-gradient(110deg, transparent 18%, rgba(255,255,255,0.12) 36%, rgba(255,255,255,0.02) 48%, transparent 62%);
  filter: blur(10px);
  opacity: 0.8;
  mix-blend-mode: screen;
  animation: featherSweep 6s ease-in-out infinite;
  pointer-events: none;
}

.duck-breathe { animation: breatheDuck 4.9s ease-in-out infinite; transform-origin: 50% 56%; }

@keyframes floatDuck { 0%,100% { transform: translateY(0) rotate(-0.4deg);} 50% { transform: translateY(-12px) rotate(0.9deg);} }
@keyframes breatheDuck { 0%,100% { transform: scale(1,1);} 50% { transform: scale(1.014,1.024);} }
@keyframes cinematicReveal { 0% { opacity: 0; transform: translateY(26px) scale(.92) rotateX(12deg); filter: blur(10px);} 55% { opacity: .88;} 100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); filter: blur(0);} }
@keyframes featherSweep { 0%,100% { transform: translateX(-18%) skewX(-10deg); opacity: .22;} 50% { transform: translateX(16%) skewX(-10deg); opacity: .72;} }

.water-group { transform-origin: center; animation: rippleBob 5.2s ease-in-out infinite; }
@keyframes rippleBob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(3px);} }
.ripple-ring { transform-origin: center; animation: rippleExpand 4.2s ease-in-out infinite; }
.ripple-ring.r2 { animation-delay: 1.4s; }
.ripple-ring.r3 { animation-delay: 2.8s; }
@keyframes rippleExpand { 0% { opacity: 0; transform: scale(.76,.78);} 20% { opacity: .32;} 72% { opacity: .14;} 100% { opacity: 0; transform: scale(1.18,1.04);} }

.reflections { opacity: .55; mix-blend-mode: screen; animation: shimmerWave 4.4s ease-in-out infinite; transform-origin: center; }
@keyframes shimmerWave { 0%,100% { transform: translateY(0) scaleX(1); opacity: .48;} 50% { transform: translateY(2px) scaleX(1.025); opacity: .62;} }

.butterfly-flight {
  position: absolute;
  width: 132px;
  height: 132px;
  left: 50%;
  top: 50%;
  margin-left: -66px;
  margin-top: -66px;
  animation: butterflyOrbit 14s cubic-bezier(.42,.02,.27,1) infinite;
  transform-style: preserve-3d;
}

@keyframes butterflyOrbit {
  0%   { transform: translate3d(-142px, -134px, 0) scale(.82) rotate(-8deg); }
  18%  { transform: translate3d(130px, -170px, 48px) scale(.90) rotate(10deg); }
  34%  { transform: translate3d(178px, -14px, 0) scale(.98) rotate(16deg); }
  52%  { transform: translate3d(24px, 122px, 34px) scale(.82) rotate(-12deg); }
  70%  { transform: translate3d(-166px, 68px, 0) scale(.92) rotate(-4deg); }
  100% { transform: translate3d(-142px, -134px, 0) scale(.82) rotate(-8deg); }
}

@keyframes trailOrbit {
  0%   { transform: translate3d(-178px, -120px, 0) rotate(-18deg) scale(.7); opacity: .15; }
  18%  { transform: translate3d(82px, -184px, 0) rotate(12deg) scale(.95); opacity: .48; }
  34%  { transform: translate3d(132px, -4px, 0) rotate(18deg) scale(1.02); opacity: .42; }
  52%  { transform: translate3d(-24px, 112px, 0) rotate(-14deg) scale(.82); opacity: .36; }
  70%  { transform: translate3d(-186px, 52px, 0) rotate(-8deg) scale(.88); opacity: .28; }
  100% { transform: translate3d(-178px, -120px, 0) rotate(-18deg) scale(.7); opacity: .15; }
}

.butterfly { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.30)); }
.wing-left, .wing-right { transform-box: fill-box; transform-origin: center; animation: flap .45s ease-in-out infinite; transform-style: preserve-3d; }
.wing-right { animation-delay: .04s; }
@keyframes flap { 0%,100% { transform: rotateY(0deg) rotateZ(0deg) translateZ(0);} 50% { transform: rotateY(68deg) rotateZ(2deg) translateZ(10px);} }

.sparkle { position: absolute; inset: 0; pointer-events: none; opacity: .48; }
.sparkle span {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.96), rgba(255,255,255,.22) 55%, transparent 72%);
  box-shadow: 0 0 10px rgba(255,255,255,.5), 0 0 22px rgba(255,128,206,.25);
  animation: twinkle 4s ease-in-out infinite;
}
.sparkle span:nth-child(1){top:16%;left:18%;animation-delay:.1s}
.sparkle span:nth-child(2){top:12%;right:22%;animation-delay:1.1s}
.sparkle span:nth-child(3){top:26%;right:10%;animation-delay:1.8s}
.sparkle span:nth-child(4){bottom:28%;left:8%;animation-delay:2.2s}
.sparkle span:nth-child(5){bottom:16%;right:19%;animation-delay:.6s}
.sparkle span:nth-child(6){top:40%;left:14%;animation-delay:2.7s}
.sparkle span:nth-child(7){top:46%;right:15%;animation-delay:3.1s}
@keyframes twinkle { 0%,100% { opacity:.24; transform: scale(.72);} 50% { opacity:1; transform: scale(1.8);} }

@media (max-width: 640px) {
  .hero { width: min(98vw, 560px); }
  .message-card { padding: 16px 16px; border-radius: 20px; }
  .audio-control { left: 12px; bottom: 12px; padding: 10px 12px; }
  .butterfly-flight { width: 98px; height: 98px; margin-left: -49px; margin-top: -49px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

  </style>
</head>

      <div class="ambient-backlight"></div>

        <path d="M119 118 C146 122, 172 136, 175 157 C178 177, 154 194, 132 186 C120 181, 108 168, 104 142 Z" fill="url(#wingOrange)" stroke="#171313" stroke-width="6" stroke-linejoin="round"/>
        <path d="M150 82 C158 92, 162 102, 165 114" fill="none" stroke="#fff8eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  </div>  <button class="audio-control" id="audioToggle" aria-label="تشغيل أو إيقاف الموسيقى" title="تشغيل / إيقاف الموسيقى">
    <span class="audio-icon" id="audioIcon">▶</span>

  </button>  <div class="overlay" id="overlay">

  </div><audio id="bgm" loop preload="auto" src="https://files.catbox.moe/qfygn0.mp3"></audio>

  <script>
    const canvas = document.getElementById('fxCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const reflectionCanvas = document.getElementById('reflectionCanvas');
    const rctx = reflectionCanvas.getContext('2d', { alpha: true });
    const glassCanvas = document.getElementById('glassCanvas');
    const gctx = glassCanvas.getContext('2d', { alpha: true });

    const root = document.documentElement;
    const overlay = document.getElementById('overlay');
    const enterBtn = document.getElementById('enterBtn');
    const bgm = document.getElementById('bgm');
    const audioToggle = document.getElementById('audioToggle');
    const audioIcon = document.getElementById('audioIcon');
    const audioLabel = document.getElementById('audioLabel');
    const dynamicMessage = document.getElementById('dynamicMessage');

    const messages = [
      'أنا آسف جداً لأنني تأخرت في الرد عليك..\nأرجوكِ سامحيني',
      'لن توصفكِ الكلمات\nيا غنيّة الجمال\nإعذري فقر اللغات!'
    ];

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let lastTime = 0;
    let initializedAudio = false;
    let currentMessage = 0;
    let sceneTargetX = 0, sceneTargetY = 0;
    let sceneX = 0, sceneY = 0;
    let pointer = { x: -9999, y: -9999, active: false };

    const rain = [];
    const petals = [];
    const fireflies = [];
    const shimmerLines = [];
    const glassDrops = [];
    const surfaceRipples = [];
    const haloBursts = [];

    class RainDrop {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.depth = 0.35 + Math.random() * 1.45;
        this.x = Math.random() * width;
        this.y = initial ? Math.random() * height : -20 - Math.random() * height * 0.2;
        this.length = (10 + Math.random() * 18) * this.depth;
        this.speed = (250 + Math.random() * 440) * (0.45 + this.depth * 0.55);
        this.wind = -20 - Math.random() * 26;
        this.alpha = 0.08 + Math.random() * 0.18 + this.depth * 0.08;
        this.thickness = 0.7 + this.depth * 0.72;
      }
      update(dt) {
        this.x += this.wind * dt;
        this.y += this.speed * dt;
        if (this.y > height * 0.7 && Math.random() < 0.004) createRipple(this.x, height * 0.72 + Math.random() * height * 0.2, 0.45);
        if (this.y - this.length > height || this.x < -80) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.lineWidth = this.thickness;
        ctx.strokeStyle = `rgba(195,220,255,${this.alpha})`;
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.wind * 0.03, this.y + this.length);
        ctx.stroke();
      }
    }

    class Petal {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * width;
        this.y = initial ? Math.random() * height : -30;
        this.size = 5 + Math.random() * 10;
        this.speedY = 24 + Math.random() * 40;
        this.speedX = 8 + Math.random() * 20;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() * 1.4 - 0.7) * 0.95;
        this.swing = 12 + Math.random() * 26;
        this.swingFreq = 0.8 + Math.random() * 1.6;
        this.t = Math.random() * Math.PI * 2;
        this.alpha = 0.42 + Math.random() * 0.34;
      }
      update(dt) {
        this.t += dt * this.swingFreq;
        this.rotation += this.rotSpeed * dt;
        this.y += this.speedY * dt;
        this.x += Math.sin(this.t) * this.swing * dt + this.speedX * 0.12 * dt;
        if (this.y > height + 40 || this.x > width + 50) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.translate(this.x + Math.sin(this.t * 2) * 5, this.y);
        ctx.rotate(this.rotation + Math.sin(this.t) * 0.36);
        const s = this.size;
        const grad = ctx.createRadialGradient(-s * 0.2, -s * 0.3, 1, 0, 0, s * 1.35);
        grad.addColorStop(0, `rgba(255,214,233,${this.alpha})`);
        grad.addColorStop(1, `rgba(255,160,205,0.05)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.bezierCurveTo(s * 0.95, -s * 0.82, s * 0.95, s * 0.55, 0, s * 1.25);
        ctx.bezierCurveTo(-s * 0.95, s * 0.55, -s * 0.95, -s * 0.82, 0, -s);
        ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,${0.1 + this.alpha * 0.24})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.8);
        ctx.lineTo(0, s * 0.9);
        ctx.stroke();
        ctx.restore();
      }
    }

    class Firefly {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * width;
        this.y = initial ? Math.random() * height : height + Math.random() * 40;
        this.radius = 1.2 + Math.random() * 3;
        this.speedY = 10 + Math.random() * 24;
        this.drift = 12 + Math.random() * 36;
        this.phase = Math.random() * Math.PI * 2;
        this.freq = 0.7 + Math.random() * 1.8;
        this.alpha = 0.35 + Math.random() * 0.52;
        this.hue = Math.random() > 0.4 ? [255, 226, 145] : [255, 170, 220];
      }
      update(dt) {
        this.phase += dt * this.freq;
        this.y -= this.speedY * dt;
        this.x += Math.sin(this.phase * 1.5) * this.drift * dt;
        if (this.y < -20) this.reset(false);
      }
      draw() {
        const pulse = 0.45 + (Math.sin(this.phase * 3.2) + 1) * 0.28;
        const r = this.radius * (0.85 + pulse * 0.45);
        const [cr, cg, cb] = this.hue;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 8);
        grad.addColorStop(0, `rgba(${cr},${cg},${cb},${this.alpha * 0.95})`);
        grad.addColorStop(0.35, `rgba(${cr},${cg},${cb},${this.alpha * 0.22})`);
        grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r * 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(255,248,210,${Math.min(1, this.alpha * 0.9 + pulse * 0.2)})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class ShimmerLine {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * width;
        this.y = height * (0.63 + Math.random() * 0.27);
        this.length = 24 + Math.random() * 80;
        this.alpha = 0.05 + Math.random() * 0.09;
        this.speed = 8 + Math.random() * 20;
        this.phase = Math.random() * Math.PI * 2;
        if (!initial) this.y = height * (0.64 + Math.random() * 0.22);
      }
      update(dt) {
        this.phase += dt * this.speed * 0.06;
        this.x += Math.cos(this.phase) * this.speed * dt;
        if (this.x > width + 100) this.x = -100;
        if (this.x < -100) this.x = width + 100;
      }
      draw() {
        const glow = 0.65 + Math.sin(this.phase * 2) * 0.2;
        ctx.strokeStyle = `rgba(185,228,255,${this.alpha * glow})`;
        ctx.lineWidth = 1.15;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.length, this.y + Math.sin(this.phase) * 1.8);
        ctx.stroke();
      }
    }

    class GlassDrop {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * width;
        this.y = initial ? Math.random() * height : -20;
        this.r = Math.random() * 1.8 + 1.2;
        this.mass = Math.random() * 1.8 + 1;
        this.speed = Math.random() * 0.4;
        this.trail = [];
      }
      update(dt) {
        this.speed += this.mass * 0.03 * dt * 60;
        this.y += this.speed;
        if (Math.random() < 0.24) this.trail.push({ x: this.x, y: this.y, r: this.r * 0.45 });
        if (this.trail.length > 16) this.trail.shift();
        if (this.y > height + 40) this.reset(false);
      }
      draw() {
        gctx.fillStyle = 'rgba(215,228,255,0.24)';
        for (const t of this.trail) {
          gctx.beginPath();
          gctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
          gctx.fill();
        }
        gctx.fillStyle = 'rgba(225,238,255,0.34)';
        gctx.beginPath();
        gctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        gctx.fill();
      }
    }

    class SurfaceRipple {
      constructor(x, y, strength = 1) {
        this.x = x;
        this.y = y;
        this.life = 0;
        this.maxLife = 1.3 + strength * 0.55;
        this.radius = 8;
        this.strength = strength;
      }
      update(dt) {
        this.life += dt;
        this.radius += 76 * dt * this.strength;
      }
      draw(target) {
        const t = this.life / this.maxLife;
        if (t >= 1) return;
        target.save();
        target.globalAlpha = (1 - t) * 0.22;
        target.strokeStyle = 'rgba(188,230,255,0.9)';
        target.lineWidth = 2 - t;
        target.beginPath();
        target.ellipse(this.x, this.y, this.radius * 1.8, this.radius * 0.34, 0, 0, Math.PI * 2);
        target.stroke();
        target.restore();
      }
      get dead() { return this.life >= this.maxLife; }
    }

    class HaloBurst {
      constructor(x, y, color = '255,130,205') {
        this.x = x;
        this.y = y;
        this.r = 6;
        this.life = 0;
        this.maxLife = 1.15;
        this.color = color;
      }
      update(dt) { this.life += dt; this.r += 44 * dt; }
      draw() {
        const t = this.life / this.maxLife;
        if (t >= 1) return;
        ctx.save();
        ctx.globalAlpha = (1 - t) * 0.24;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3.8);
        grad.addColorStop(0, `rgba(${this.color},0.42)`);
        grad.addColorStop(1, `rgba(${this.color},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 3.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      get dead() { return this.life >= this.maxLife; }
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      for (const c of [canvas, reflectionCanvas, glassCanvas]) {
        c.width = Math.floor(width * dpr);
        c.height = Math.floor(height * dpr);
        c.style.width = width + 'px';
        c.style.height = height + 'px';
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      rctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initParticles();
    }

    function initParticles() {
      rain.length = 0;
      petals.length = 0;
      fireflies.length = 0;
      shimmerLines.length = 0;
      glassDrops.length = 0;
      surfaceRipples.length = 0;
      haloBursts.length = 0;

      const rainCount = Math.min(240, Math.floor(width * height / 4800));
      const petalCount = Math.min(52, Math.floor(width * height / 25000) + 10);
      const fireflyCount = Math.min(32, Math.floor(width * height / 32000) + 8);
      const shimmerCount = Math.min(24, Math.floor(width / 56));
      const glassCount = Math.min(42, Math.floor(width / 28));

      for (let i = 0; i < rainCount; i++) rain.push(new RainDrop());
      for (let i = 0; i < petalCount; i++) petals.push(new Petal());
      for (let i = 0; i < fireflyCount; i++) fireflies.push(new Firefly());
      for (let i = 0; i < shimmerCount; i++) shimmerLines.push(new ShimmerLine());
      for (let i = 0; i < glassCount; i++) glassDrops.push(new GlassDrop());
    }

    function createRipple(x, y, strength = 1) {
      if (surfaceRipples.length > 18) surfaceRipples.shift();
      surfaceRipples.push(new SurfaceRipple(x, y, strength));
    }

    function drawAtmosphericGlow() {
      const topGlow = ctx.createRadialGradient(width * 0.76, height * 0.16, 0, width * 0.76, height * 0.16, Math.max(width, height) * 0.22);
      topGlow.addColorStop(0, 'rgba(177,210,255,0.12)');
      topGlow.addColorStop(0.4, 'rgba(130,166,232,0.04)');
      topGlow.addColorStop(1, 'rgba(130,166,232,0)');
      ctx.fillStyle = topGlow;
      ctx.fillRect(0, 0, width, height);

      const pinkGlow = ctx.createRadialGradient(width * 0.26, height * 0.28, 0, width * 0.26, height * 0.28, Math.max(width, height) * 0.16);
      pinkGlow.addColorStop(0, 'rgba(255,120,201,0.08)');
      pinkGlow.addColorStop(1, 'rgba(255,120,201,0)');
      ctx.fillStyle = pinkGlow;
      ctx.fillRect(0, 0, width, height);

      const lowGlow = ctx.createLinearGradient(0, height * 0.56, 0, height);
      lowGlow.addColorStop(0, 'rgba(255,255,255,0)');
      lowGlow.addColorStop(1, 'rgba(52,86,128,0.14)');
      ctx.fillStyle = lowGlow;
      ctx.fillRect(0, height * 0.56, width, height * 0.44);
    }

    function drawReflections(time) {
      rctx.clearRect(0, 0, width, height);
      const waterY = height * 0.66;
      const grad = rctx.createLinearGradient(0, waterY, 0, height);
      grad.addColorStop(0, 'rgba(170,215,255,0)');
      grad.addColorStop(0.18, 'rgba(170,215,255,0.05)');
      grad.addColorStop(1, 'rgba(50,90,138,0.10)');
      rctx.fillStyle = grad;
      rctx.fillRect(0, waterY, width, height - waterY);

      const cx = width * 0.5 + sceneX * 0.8;
      const core = rctx.createRadialGradient(cx, waterY + 18, 0, cx, waterY + 18, Math.min(width, height) * 0.18);
      core.addColorStop(0, 'rgba(220,240,255,0.12)');
      core.addColorStop(0.5, 'rgba(170,215,255,0.05)');
      core.addColorStop(1, 'rgba(170,215,255,0)');
      rctx.fillStyle = core;
      rctx.beginPath();
      rctx.ellipse(cx, waterY + 26, Math.min(width, 420) * 0.36, Math.min(height, 220) * 0.22, 0, 0, Math.PI * 2);
      rctx.fill();

      for (let i = 0; i < 10; i++) {
        const y = waterY + 14 + i * 18 + Math.sin(time * 0.0016 + i) * 2;
        const alpha = 0.02 + i * 0.005;
        const g = rctx.createLinearGradient(width * 0.2, y, width * 0.8, y);
        g.addColorStop(0, `rgba(190,230,255,0)`);
        g.addColorStop(0.5, `rgba(190,230,255,${alpha})`);
        g.addColorStop(1, `rgba(190,230,255,0)`);
        rctx.fillStyle = g;
        rctx.fillRect(width * 0.18, y, width * 0.64, 2.2);
      }

      rctx.save();
      rctx.translate(cx, waterY + 24);
      rctx.scale(1, 0.72);
      rctx.beginPath();
      rctx.ellipse(0, 46, Math.min(width, 420) * 0.18, Math.min(height, 220) * 0.11, 0, 0, Math.PI * 2);
      const duckRef = rctx.createRadialGradient(0, 20, 0, 0, 40, 140);
      duckRef.addColorStop(0, 'rgba(255,255,255,0.13)');
      duckRef.addColorStop(0.45, 'rgba(200,228,255,0.07)');
      duckRef.addColorStop(1, 'rgba(200,228,255,0)');
      rctx.fillStyle = duckRef;
      rctx.fill();
      rctx.restore();

      for (let i = surfaceRipples.length - 1; i >= 0; i--) surfaceRipples[i].draw(rctx);
    }

    function drawGlass() {
      gctx.clearRect(0, 0, width, height);
      if (Math.random() < 0.08 && glassDrops.length < 58) glassDrops.push(new GlassDrop());
      for (const d of glassDrops) { d.update(0.016); d.draw(); }
    }

    function animate(time) {
      const now = time * 0.001;
      const dt = Math.min(0.033, now - lastTime || 0.016);
      lastTime = now;

      sceneX += (sceneTargetX - sceneX) * 0.06;
      sceneY += (sceneTargetY - sceneY) * 0.06;
      root.style.setProperty('--sceneX', `${sceneX.toFixed(2)}px`);
      root.style.setProperty('--sceneY', `${sceneY.toFixed(2)}px`);
      root.style.setProperty('--tiltX', `${(sceneX * 0.05).toFixed(2)}deg`);
      root.style.setProperty('--tiltY', `${(-sceneY * 0.05).toFixed(2)}deg`);

      ctx.clearRect(0, 0, width, height);
      drawAtmosphericGlow();

      for (const drop of rain) { drop.update(dt); drop.draw(); }
      for (const shimmer of shimmerLines) { shimmer.update(dt); shimmer.draw(); }
      for (const petal of petals) { petal.update(dt); petal.draw(); }
      for (const firefly of fireflies) { firefly.update(dt); firefly.draw(); }

      for (let i = surfaceRipples.length - 1; i >= 0; i--) {
        surfaceRipples[i].update(dt);
        if (surfaceRipples[i].dead) surfaceRipples.splice(i, 1);
      }

      for (let i = haloBursts.length - 1; i >= 0; i--) {
        haloBursts[i].update(dt);
        haloBursts[i].draw();
        if (haloBursts[i].dead) haloBursts.splice(i, 1);
      }

      drawReflections(time);
      drawGlass();
      requestAnimationFrame(animate);
    }

    function setMessage(index, immediate = false) {
      const text = messages[index % messages.length];
      if (immediate) {
        dynamicMessage.textContent = text;
        requestAnimationFrame(() => dynamicMessage.classList.add('show'));
        return;
      }
      dynamicMessage.classList.remove('show');
      setTimeout(() => {
        dynamicMessage.textContent = text;
        dynamicMessage.classList.add('show');
      }, 520);
    }

    function cycleMessages() {
      setMessage(currentMessage, true);
      setInterval(() => {
        currentMessage = (currentMessage + 1) % messages.length;
        setMessage(currentMessage);
      }, 8000);
    }

    async function startExperience() {
      overlay.classList.add('hide');
      haloBursts.push(new HaloBurst(width * 0.5, height * 0.5, '255,130,205'));
      haloBursts.push(new HaloBurst(width * 0.5, height * 0.64, '150,216,255'));
      createRipple(width * 0.5, height * 0.72, 1.6);
      if (!initializedAudio) {
        try {
          bgm.volume = 0.72;
          await bgm.play();
          initializedAudio = true;
        } catch (err) {
          console.warn('Autoplay prevented:', err);
        }
      } else if (bgm.paused) {
        try { await bgm.play(); } catch (err) {}
      }
      syncAudioUI();
    }

    function syncAudioUI() {
      const playing = !bgm.paused;
      audioIcon.textContent = playing ? '❚❚' : '▶';
      audioLabel.textContent = playing ? 'إيقاف الموسيقى' : 'تشغيل الموسيقى';
    }

    function setPointer(x, y, burst = false) {
      const nx = (x / width - 0.5) * 2;
      const ny = (y / height - 0.5) * 2;
      sceneTargetX = nx * 18;
      sceneTargetY = ny * 14;
      pointer.x = x;
      pointer.y = y;
      pointer.active = true;
      if (y > height * 0.56) createRipple(x, y, burst ? 1.3 : 0.82 + Math.abs(nx) * 0.36);
      if (burst) haloBursts.push(new HaloBurst(x, y, Math.random() > 0.5 ? '255,130,205' : '150,216,255'));
    }

    window.addEventListener('pointermove', (e) => setPointer(e.clientX, e.clientY), { passive: true });
    window.addEventListener('touchmove', (e) => {
      const t = e.touches && e.touches[0];
      if (t) setPointer(t.clientX, t.clientY);
    }, { passive: true });
    window.addEventListener('pointerleave', () => {
      sceneTargetX = 0;
      sceneTargetY = 0;
      pointer.active = false;
    });
    window.addEventListener('click', (e) => setPointer(e.clientX, e.clientY, true));

    enterBtn.addEventListener('click', startExperience);
    audioToggle.addEventListener('click', async () => {
      if (bgm.paused) {
        try { await bgm.play(); initializedAudio = true; } catch (err) { console.warn(err); }
      } else {
        bgm.pause();
      }
      syncAudioUI();
    });

    bgm.addEventListener('play', syncAudioUI);
    bgm.addEventListener('pause', syncAudioUI);
    window.addEventListener('resize', resize);

    resize();
    cycleMessages();
    setTimeout(() => {
      createRipple(width * 0.5, height * 0.72, 1.5);
      haloBursts.push(new HaloBurst(width * 0.5, height * 0.64, '255,130,205'));
    }, 700);
    requestAnimationFrame(animate);
    syncAudioUI();
  </script></body>
